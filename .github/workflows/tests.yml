name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.12 matches local dev; 3.13/3.14 catch dependency-resolution
        # issues against newer Pythons before they hit a real deploy (this
        # is exactly how the psycopg[binary] pin broke Render's build).
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

      - name: Lint and format check
        if: matrix.python-version == '3.12'
        run: |
          pip install ruff
          ruff check .
          ruff format --check .

      - name: Audit dependencies for known vulnerabilities
        # Only needs to run once - it's checking requirements.txt, not
        # anything Python-version-specific.
        if: matrix.python-version == '3.12'
        run: |
          pip install pip-audit
          # Ignored: fixes are all major-version bumps of core deps
          # (langgraph 0.x->1.x, starlette 0.x->1.x via fastapi, pytest
          # 8->9) that need their own dedicated upgrade+regression-test
          # pass, not something to silently pull in here. Everything else
          # (including future new findings) still fails the build.
          pip-audit -r requirements.txt \
            --ignore-vuln PYSEC-2026-83 \
            --ignore-vuln PYSEC-2026-1845 \
            --ignore-vuln PYSEC-2026-1527 \
            --ignore-vuln PYSEC-2026-2573 \
            --ignore-vuln PYSEC-2026-2574 \
            --ignore-vuln PYSEC-2026-2575 \
            --ignore-vuln PYSEC-2026-161 \
            --ignore-vuln PYSEC-2026-249 \
            --ignore-vuln PYSEC-2026-248 \
            --ignore-vuln PYSEC-2026-1942 \
            --ignore-vuln PYSEC-2026-2281 \
            --ignore-vuln PYSEC-2026-2280
